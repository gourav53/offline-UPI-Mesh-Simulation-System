<!DOCTYPE html>
<html>
<head>
    <title>UPI Mesh Frontend</title>
</head>
<body>

<h2>Send Payment</h2>

<input id="from" placeholder="alice@demo">
<input id="to" placeholder="bob@demo">
<input id="amount" placeholder="500">

<button onclick="sendPayment()">Send</button>

<script>
    function sendPayment() {
        fetch('/api/payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                from: document.getElementById('from').value,
                to: document.getElementById('to').value,
                amount: document.getElementById('amount').value
            })
        })
        .then(res => res.json())
        .then(data => console.log(data));
    }
</script>

</body>
</html>
